name: 📦 Build Genius Invokation
run-name: ${{ github.actor }} is building Genius Invokation

on:
  push:
    branches: [xqm32/pyci]

jobs:
  Build-Core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: |
          bun install
          bun run build:prod
      - uses: actions/upload-artifact@v4
        with:
          name: cbinding-source
          path: packages/cbinding
      - uses: actions/upload-artifact@v4
        with:
          name: pybinding-source
          path: packages/pybinding

  Build-C:
    needs: Build-Core
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            build_type: Release
            arch: x86_64
          - os: windows-2022
            build_type: Release
            arch: x86_64
          - os: macos-15
            build_type: Release
            arch: x86_64
          - os: macos-15
            build_type: Release
            arch: arm64
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cbinding-source
          path: cbinding
      - uses: lukka/get-cmake@v3.31.0
      - if: ${{ runner.os == 'Windows' }}
        uses: ilammy/msvc-dev-cmd@v1
      - uses: actions/cache@v4
        with:
          path: cbinding/build
          key: ${{ runner.os }}-${{ matrix.arch }}-build
      - run: >
          cmake -B cbinding/build
          -GNinja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_APPLE_SILICON_PROCESSOR=${{ matrix.arch }}
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
          -S cbinding
      - run: cmake --build cbinding/build --config ${{ matrix.build_type }}
      - run: >
          cmake --install cbinding/build
          --config ${{ matrix.build_type }}
          --prefix cbinding/install
      - uses: actions/upload-artifact@v4
        with:
          name: cbinding-library-${{ runner.os }}-${{ matrix.arch }}
          path: cbinding/install

  Build-Python:
    needs: Build-C
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pybinding-source
          path: pybinding
      - uses: actions/download-artifact@v4
        with:
          pattern: cbinding-library-*
          path: cbinding
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - run: |
          cp -r cbinding/cbinding-library-Linux-x86_64 cbinding/install
          pushd pybinding
          uv run scripts/build_ffi.py
          bash -ex scripts/build.sh Linux-x86_64
          uv run pdoc gitcg !gitcg.proto -o _docs
          bash -ex scripts/build.sh Windows-x86_64
          bash -ex scripts/build.sh macOS-x86_64
          bash -ex scripts/build.sh macOS-arm64
          popd
      - uses: actions/upload-artifact@v4
        with:
          name: pybinding-dist
          path: pybinding/dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: pybinding-docs
          path: pybinding/_docs
      - if: startsWith(github.ref, 'refs/tags/')
        run: |
          pushd pybinding
          uv publish
          popd

  Deploy-Docs-Python:
    needs: Build-Python
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PYBINDING }}
    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/download-artifact@v4
        with:
          name: pybinding-docs
          path: ${{ github.workspace }}
      - run: >
          bunx vercel deploy
          ${{ github.ref == 'refs/heads/main' && '--prod' || '' }}
          --token=${{ secrets.VERCEL_TOKEN }}
